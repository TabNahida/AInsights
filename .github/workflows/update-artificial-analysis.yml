name: Update model and benchmark data

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-model-and-benchmark-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run tests before update
        run: python -B -m unittest discover -s tests

      - name: Fetch latest Artificial Analysis data
        run: python ArtificialAnalysis/scrape_artificial_analysis.py --output-dir ArtificialAnalysis

      - name: Fetch benchmark data
        run: python benchmarks/collect_benchmark_scores.py --output-json data/benchmarks/benchmark_scores.json

      - name: Validate official benchmark source policy
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          top_vendor_source_ids = {
              "openai-gpt-5-6-release",
              "anthropic-claude-opus-4-7-release",
              "qwen-qwen3-6-27b-card",
              "qwen-qwen3-6-plus-release",
              "qwen-qwen3-6-max-preview-release",
              "deepseek-v4-pro-card",
              "kimi-k3-release",
              "kimi-k2-6-card",
              "kimi-k2-thinking-card",
              "kimi-k2-5-card",
              "zai-glm-5-1-card",
              "google-gemini-3-1-pro-card",
              "google-gemma-4-card",
              "xiaomi-mimo-v2-5-release",
              "xai-grok-4-1-fast-release",
              "nvidia-nemotron-3-ultra-report",
          }
          payload = json.loads(Path("data/benchmarks/benchmark_scores.json").read_text(encoding="utf-8"))
          bad_sources = [
              source
              for source in payload.get("sources", [])
              if source.get("id") in top_vendor_source_ids
              and "huggingface.co" in source.get("url", "")
          ]
          if bad_sources:
              details = ", ".join(f"{source['id']} -> {source['url']}" for source in bad_sources)
              raise SystemExit(f"Top-vendor official benchmark sources must not use Hugging Face as primary URL: {details}")
          print(f"Validated {len(top_vendor_source_ids)} top-vendor official source ids.")
          PY

      - name: Rebuild docs site data
        run: python scripts/build_docs_site.py

      - name: Run tests after update
        run: python -B -m unittest discover -s tests

      - name: Commit changed data and site
        id: commit
        run: |
          git add ArtificialAnalysis/artificialanalysis_raw_scores_wide.csv data/benchmarks/benchmark_scores.json docs/data/models.json docs/data/models.js docs/assets/logos
          if git diff --cached --quiet; then
            echo "No model or benchmark changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update model and benchmark data"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Rebase latest branch before push
        if: steps.commit.outputs.changed == 'true'
        run: |
          if ! git pull --rebase --autostash origin "$GITHUB_REF_NAME"; then
            git rebase --abort || true
            echo "::error::Remote changes conflict with refreshed benchmark data. Rerun after resolving the branch."
            exit 1
          fi

      - name: Push changed data and site
        if: steps.commit.outputs.changed == 'true'
        run: git push origin "HEAD:$GITHUB_REF_NAME"
