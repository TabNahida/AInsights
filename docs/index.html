<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Insights Analysis</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">AInsights</p>
        <h1>AI Insights Analysis</h1>
      </div>
      <div class="header-actions">
        <div class="segmented-control compact" id="languageButtons" role="group" aria-label="语言"></div>
        <div class="source-block">
          <span id="updatedAt">加载中</span>
          <a id="sourceLink" href="https://artificialanalysis.ai/evaluations/artificial-analysis-intelligence-index" target="_blank" rel="noreferrer">数据源</a>
        </div>
      </div>
    </header>

    <main>
      <section class="controls" aria-label="排名控制">
        <div class="preset-row" id="presetButtons" role="tablist" aria-label="排名预设"></div>
        <div class="switch-row">
          <div class="segmented-control" id="viewButtons" role="group" aria-label="展示方式"></div>
          <div class="segmented-control" id="sourceFilterButtons" role="group" aria-label="模型来源"></div>
        </div>
        <div class="filter-row">
          <label class="search-label">
            <span id="searchLabel">搜索</span>
            <input id="searchInput" type="search" placeholder="模型或机构" />
          </label>
          <label class="toggle-label">
            <input id="dedupeToggle" type="checkbox" checked />
            <span id="dedupeLabel">去除重复档位</span>
          </label>
        </div>
        <div class="summary-row" id="summaryRow"></div>
      </section>

      <section class="custom-panel" id="customPanel" hidden>
        <div class="panel-head">
          <h2 id="customTitle">自定义占比</h2>
          <button id="resetWeightsButton" type="button">重置</button>
        </div>
        <div class="weights-grid" id="weightsGrid"></div>
      </section>

      <section class="ranking-shell">
        <div class="histogram-list" id="histogramList"></div>
        <div class="table-wrap" id="tableRanking">
          <table>
            <thead>
              <tr>
                <th class="rank-col">#</th>
                <th id="modelHeader">模型</th>
                <th id="scoreHeader">综合分</th>
                <th id="sourceHeader">来源</th>
                <th id="coverageHeader">覆盖</th>
              </tr>
            </thead>
            <tbody id="rankingBody"></tbody>
          </table>
        </div>
        <div class="text-ranking" id="textRanking" hidden></div>
      </section>
    </main>

    <footer class="site-footer" id="siteFooter">
      数据来源：<a href="https://artificialanalysis.ai/evaluations/artificial-analysis-intelligence-index" target="_blank" rel="noreferrer">Artificial Analysis</a>。AInsights Index 基于其公开评测数据重新计算。
    </footer>

    <template id="metricTemplate">
      <label class="weight-control">
        <span></span>
        <input type="range" min="0" max="20" step="0.01" />
        <output></output>
      </label>
    </template>

    <script src="./data/models.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
